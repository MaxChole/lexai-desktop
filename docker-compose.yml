version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: lexai-postgres
    environment:
      POSTGRES_USER: lexai
      POSTGRES_PASSWORD: lexai_dev_password
      POSTGRES_DB: lexai
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lexai']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lexai-redis
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata: